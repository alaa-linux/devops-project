name: CI-CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Connexion à Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image backend
        run: |
          docker build -t backend-node-app ./backend
          docker tag backend-node-app:latest 377152274560.dkr.ecr.eu-west-3.amazonaws.com/backend-node-app:latest

      - name: Push image backend
        run: |
          docker push 377152274560.dkr.ecr.eu-west-3.amazonaws.com/backend-node-app:latest

      - name: Build image frontend
        run: |
          docker build -t frontend-react-app ./frontend
          docker tag frontend-react-app:latest 377152274560.dkr.ecr.eu-west-3.amazonaws.com/frontend-react-app:latest

      - name: Push image frontend
        run: |
          docker push 377152274560.dkr.ecr.eu-west-3.amazonaws.com/frontend-react-app:latest
